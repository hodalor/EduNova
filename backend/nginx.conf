worker_processes auto;

events {
  worker_connections 2048;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    application/json
    application/javascript
    text/css
    text/javascript
    text/plain
    text/xml;

  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=api_general:20m rate=100r/m;
  limit_conn_zone $binary_remote_addr zone=perip:20m;

  upstream eduova_backend {
    server 127.0.0.1:5000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name api.eduova.example.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name api.eduova.example.com;

    ssl_certificate /etc/ssl/certs/eduova/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/eduova/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Replace the certificate paths above with your production certificate material.
    # For local or staging environments, terminate SSL at your load balancer if preferred.

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    limit_conn perip 20;

    location /api/auth/ {
      limit_req zone=api_auth burst=10 nodelay;
      proxy_pass http://eduova_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /socket.io/ {
      proxy_pass http://eduova_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location / {
      limit_req zone=api_general burst=200 nodelay;
      proxy_pass http://eduova_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
