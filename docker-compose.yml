services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eduova
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://frontend
    depends_on:
      - postgres
      - redis
    ports:
      - '5000:5000'
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
